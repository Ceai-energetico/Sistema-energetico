services:
  - type: web
    name: sistema-energetico-backend
    env: python
    region: ohio
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:10000 backend.app:app"
    envVars:
      - key: DATABASE_URL
        scope: build
        sync: false
      - key: CORS_ORIGINS
        value: "https://<your-frontend-url>.onrender.com"
        sync: false
